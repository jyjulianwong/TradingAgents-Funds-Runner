name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "terraform/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - "terraform/**"

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.9.0"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.AWS_ACCOUNT_ID }}-jyjulianwong-tafr-terraform-state
          TF_BACKEND_TABLE:  jyjulianwong-tafr-terraform-lock
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="dynamodb_table=$TF_BACKEND_TABLE"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: terraform-plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const planOutput = `${{ steps.terraform-plan.outputs.stdout }}`.slice(0, 60000);
            const body = `### Terraform Plan\n\`\`\`\n${planOutput}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.AWS_ACCOUNT_ID }}-jyjulianwong-tafr-terraform-state
          TF_BACKEND_TABLE:  jyjulianwong-tafr-terraform-lock
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="dynamodb_table=$TF_BACKEND_TABLE"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -auto-approve \
            -no-color
